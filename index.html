<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseumMap Netherlands</title>

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"
    >

    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"
    >

    <style>
        body {
            background: yellow;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        header p {
            font-size: 18px;
        }

        #filterContainer {
            width: 800px;
            max-width: 95%;
            margin: 0 auto;
        }

        #filterToggle {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: 2px solid black;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
        }

        #filterPanel {
            display: none;
            background: white;
            border: 2px solid black;
            border-top: none;
            padding: 15px;
            border-radius: 0 0 10px 10px;
        }

        .filterItem {
            margin-bottom: 10px;
        }

        .filterItem label {
            margin-left: 8px;
        }

        .keywordColor {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            margin-left: 8px;
            margin-right: 6px;
            border: 1px solid black;
            vertical-align: middle;
        }

        #map {
            width: 800px;
            max-width: 95%;
            height: 500px;
            margin: 40px auto;
            border: 2px solid black;
            border-radius: 10px;
        }

        #loading {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            font-size: 18px;
            display: none;
        }

        .dots::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% { content: ""; }
            25% { content: "."; }
            50% { content: ".."; }
            75% { content: "..."; }
            100% { content: ""; }
        }

        @media (max-width: 850px) {
            #map {
                height: 400px;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>MuseumMap Netherlands</h1>
        <p>Discover museums across the Netherlands.</p>
    </header>

    <div id="filterContainer">
        <button id="filterToggle">Museum types</button>
        <div id="filterPanel"></div>
    </div>

    <div id="loading">
        Loading museums<span class="dots"></span>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <script>
        const map = L.map("map").setView([52.1326, 5.2913], 7);

        L.tileLayer(
            "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            {
                attribution: "&copy; OpenStreetMap contributors"
            }
        ).addTo(map);

        const markerCluster = L.markerClusterGroup({
            chunkedLoading: true,
            maxClusterRadius: 45
        });

        map.addLayer(markerCluster);

        const loading = document.getElementById("loading");
        const filterPanel = document.getElementById("filterPanel");
        const filterToggle = document.getElementById("filterToggle");

        let museums = [];
        let activeTypes = new Set();
        let currentAbortController = null;
        let hasCreatedFilterPanel = false;

        const museumColors = {
            art: "red",
            gallery: "darkred",
            transport: "blue",
            railway: "navy",
            aviation: "skyblue",
            aerospace: "deepskyblue",
            maritime: "teal",
            science: "green",
            technology: "limegreen",
            nature: "darkgreen",
            agriculture: "olive",
            history: "brown",
            military: "darkslategray",
            war: "black",
            archaeological: "chocolate",
            open_air: "orange",
            local: "gold",
            children: "hotpink",
            ethnography: "purple",
            person: "mediumvioletred",
            language: "indigo",
            health: "crimson",
            other: "BlueViolet"
        };

        const categories = {
            art: ["art", "gallery", "kunst", "painting", "modern art"],
            history: ["history", "historisch", "heritage", "historic"],
            war: ["war", "military", "oorlog", "army", "battle"],
            science: ["science", "technology", "techniek", "physics", "chemistry"],
            railway: ["rail", "railway", "train", "spoor", "locomotive"],
            maritime: ["maritime", "ship", "scheepvaart", "naval", "harbor"],
            aviation: ["aviation", "luchtvaart", "aircraft", "plane", "airport"],
            nature: ["nature", "natural history", "natuur", "wildlife", "zoology"],
            children: ["children", "kids", "speelgoed", "toy"],
            archaeological: ["archaeology", "archeology", "archaeological", "romeins"],
            open_air: ["open air", "openlucht", "outdoor"]
        };

        filterToggle.addEventListener("click", () => {
            filterPanel.style.display =
                filterPanel.style.display === "block" ? "none" : "block";
        });

        map.on("moveend", debounce(loadMuseumsInView, 600));

        loadMuseumsInView();

        function debounce(callback, delay) {
            let timer;

            return function () {
                clearTimeout(timer);
                timer = setTimeout(callback, delay);
            };
        }

        function getOverpassQuery() {
            const bounds = map.getBounds();
            const south = bounds.getSouth();
            const west = bounds.getWest();
            const north = bounds.getNorth();
            const east = bounds.getEast();

            return `
[out:json][timeout:25];
(
  node["tourism"="museum"](${south},${west},${north},${east});
  way["tourism"="museum"](${south},${west},${north},${east});
  relation["tourism"="museum"](${south},${west},${north},${east});
);
out center tags;
`;
        }

        function loadMuseumsInView() {
            if (currentAbortController) {
                currentAbortController.abort();
            }

            currentAbortController = new AbortController();
            loading.style.display = "block";

            fetch("https://overpass-api.de/api/interpreter", {
                method: "POST",
                body: getOverpassQuery(),
                signal: currentAbortController.signal
            })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP ERROR ${response.status}`);
                    }

                    return response.json();
                })
                .then(data => {
                    museums = data.elements
                        .map(parseMuseum)
                        .filter(Boolean);

                    updateFilterPanel();
                    showMuseums();

                    loading.style.display = "none";
                })
                .catch(error => {
                    if (error.name === "AbortError") {
                        return;
                    }

                    console.error("OVERPASS ERROR:", error);
                    loading.innerText = "Error loading museums.";
                    loading.style.display = "block";
                });
        }

        function parseMuseum(element) {
            const lat = element.lat || (element.center && element.center.lat);
            const lon = element.lon || (element.center && element.center.lon);

            if (!lat || !lon) {
                return null;
            }

            const tags = element.tags || {};
            const name = tags.name || "Museum";

            const text = [
                tags.name,
                tags.museum,
                tags.subject,
                tags.theme,
                tags.collection,
                tags.description
            ]
                .filter(Boolean)
                .join(" ")
                .toLowerCase();

            let museumType = "other";

            for (const [type, keywords] of Object.entries(categories)) {
                if (keywords.some(keyword => text.includes(keyword))) {
                    museumType = type;
                    break;
                }
            }

            if (
                museumType === "other" &&
                tags.museum &&
                museumColors[tags.museum]
            ) {
                museumType = tags.museum;
            }

            return {
                id: element.id,
                name,
                lat,
                lon,
                type: museumType,
                color: museumColors[museumType] || museumColors.other
            };
        }

        function updateFilterPanel() {
            const availableTypes = [...new Set(museums.map(museum => museum.type))]
                .sort();

            if (!hasCreatedFilterPanel) {
                availableTypes.forEach(type => activeTypes.add(type));
                hasCreatedFilterPanel = true;
            } else {
                availableTypes.forEach(type => {
                    if (!document.getElementById(`filter-${type}`)) {
                        activeTypes.add(type);
                    }
                });
            }

            filterPanel.innerHTML = "";

            availableTypes.forEach(type => {
                const wrapper = document.createElement("div");
                wrapper.className = "filterItem";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.checked = activeTypes.has(type);
                checkbox.id = `filter-${type}`;

                checkbox.addEventListener("change", () => {
                    if (checkbox.checked) {
                        activeTypes.add(type);
                    } else {
                        activeTypes.delete(type);
                    }

                    showMuseums();
                });

                const colorBox = document.createElement("span");
                colorBox.className = "keywordColor";
                colorBox.style.backgroundColor =
                    museumColors[type] || museumColors.other;

                const label = document.createElement("label");
                label.htmlFor = checkbox.id;
                label.textContent = type.replace("_", " ");

                wrapper.appendChild(checkbox);
                wrapper.appendChild(colorBox);
                wrapper.appendChild(label);

                filterPanel.appendChild(wrapper);
            });
        }

        function showMuseums() {
            markerCluster.clearLayers();

            const markers = museums
                .filter(museum => activeTypes.has(museum.type))
                .map(createMarker);

            markerCluster.addLayers(markers);
        }

        function createMarker(museum) {
            const marker = L.circleMarker(
                [museum.lat, museum.lon],
                {
                    radius: 7,
                    color: "black",
                    weight: 1,
                    fillColor: museum.color,
                    fillOpacity: 0.9
                }
            );

            marker.bindPopup(`
                <strong>${escapeHtml(museum.name)}</strong><br>
                Type: ${escapeHtml(museum.type.replace("_", " "))}
            `);

            return marker;
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>"']/g, character => {
                return {
                    "&": "&amp;",
                    "<": "&lt;",
                    ">": "&gt;",
                    '"': "&quot;",
                    "'": "&#039;"
                }[character];
            });
        }
    </script>
</body>
</html>
