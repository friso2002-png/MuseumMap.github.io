<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MuseumMap Netherlands</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            background-color: yellow;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        header p {
            font-size: 18px;
            color: #333;
        }

        #map {
            height: 500px;
            width: 800px;
            margin: 40px auto;
            border: 2px solid black;
            border-radius: 10px;
        }

        /* Responsive voor mobiel */
        @media (max-width: 850px) {
            #map {
                width: 95%;
                height: 400px;
            }
        }

        #loading {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            font-size: 18px;
            margin: 0 auto;
        }

        /* Animated dots */
        .dots::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% {
                content: "";
            }

            25% {
                content: ".";
            }

            50% {
                content: "..";
            }

            75% {
                content: "...";
            }

            100% {
                content: "";
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>MuseumMap Netherlands</h1>
        <p>Discover the countless museums scattered across the Netherlands.</p>
    </header>

    <!-- Loading -->
    <div id="loading">
        Loading museums<span class="dots"></span>
    </div>

    <!-- Kaart -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // Kaart initialiseren
        var map = L.map('map').setView([52.370216, 4.895168], 7);

        // OpenStreetMap tiles
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap contributors'
            }
        ).addTo(map);

        // LayerGroup voor markers
        var markersLayer = L.layerGroup().addTo(map);

        // Museums opslaan
        var museums = [];

        // Overpass API query
        var query = `
        [out:json][timeout:25];
        area["name"="Nederland"]->.searchArea;
        (
          node["tourism"="museum"](area.searchArea);
          way["tourism"="museum"](area.searchArea);
          relation["tourism"="museum"](area.searchArea);
        );
        out center tags;
        `;

        // Data ophalen
        fetch("https://overpass-api.de/api/interpreter", {
            method: "POST",
            body: query
        })

        .then(res => res.json())

        .then(data => {

            data.elements.forEach(el => {

                var lat =
                    el.lat ||
                    (el.center && el.center.lat);

                var lon =
                    el.lon ||
                    (el.center && el.center.lon);

                // Skip zonder coordinaten
                if (!lat || !lon) return;

                var tags = el.tags || {};

                // Museumnaam
                var name =
                    tags.name || "Museum";

                // Museum opslaan
                museums.push({
                    name: name,
                    lat: lat,
                    lon: lon
                });
            });

            // Eerst alles tonen
            showMuseums();

            // Loading verbergen
            document.getElementById("loading").style.display = "none";
        })

        .catch(err => {
            console.error("Fout bij ophalen data:", err);

            document.getElementById("loading").innerText =
                "Fout bij laden van museums.";
        });

        // Museums tonen
        function showMuseums() {

            markersLayer.clearLayers();

            museums.forEach(museum => {

                var marker = L.marker([museum.lat, museum.lon])
                    .addTo(markersLayer);

                // Eerst loading tonen
                marker.bindPopup(`
                    Loading<span class="dots"></span>
                `);

                // Wanneer popup opent
                marker.on("click", function () {

                    // Tijdelijke loading popup
                    marker.setPopupContent(`
                        Loading<span class="dots"></span>
                    `);

                    // Simuleer trage data
                    setTimeout(() => {

                        marker.setPopupContent(`
                            <b>${museum.name}</b><br><br>
                            
                            <a 
                                href="https://www.google.com/maps/search/?api=1&query=${museum.lat},${museum.lon}" 
                                target="_blank"
                            >
                                Open in Google Maps
                            </a>
                        `);

                    }, 500);

                });

            });
        }

    </script>

</body>
</html>
