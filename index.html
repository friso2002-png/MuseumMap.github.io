<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MuseumMap Netherlands</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            background-color: yellow;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        header p {
            font-size: 18px;
            color: #333;
        }

        #map {
            height: 500px;
            width: 800px;
            margin: 40px auto;
            border: 2px solid black;
            border-radius: 10px;
        }

        /* Responsive voor mobiel */
        @media (max-width: 850px) {
            #map {
                width: 95%;
                height: 400px;
            }
        }

        #loading {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            font-size: 18px;
            margin: 0 auto;
        }

        /* Animated dots */
        .dots::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% {
                content: "";
            }

            25% {
                content: ".";
            }

            50% {
                content: "..";
            }

            75% {
                content: "...";
            }

            100% {
                content: "";
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>MuseumMap Netherlands</h1>
        <p>Discover the countless museums scattered across the Netherlands.</p>
    </header>

    <!-- Loading -->
    <div id="loading">
        Loading museums<span class="dots"></span>
    </div>

    <!-- Kaart -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // Kaart initialiseren
        var map = L.map('map').setView([52.370216, 4.895168], 7);

        // OpenStreetMap tiles
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap contributors'
            }
        ).addTo(map);

        // LayerGroup voor markers
        var markersLayer = L.layerGroup().addTo(map);

        // Museums opslaan
        var museums = [];

        // Kleuren per museumtype
        const museumColors = {

            // Art
            art: "#e74c3c",
            gallery: "#ff6b6b",

            // Transport
            transport: "#3498db",
            railway: "#2980b9",
            aviation: "#5dade2",
            aerospace: "#85c1e9",
            maritime: "#1f618d",

            // Science
            science: "#2ecc71",
            apis_mellifera: "#f4d03f",
            nature: "#27ae60",
            technology: "#16a085",
            agriculture: "#52be80",
            palaeontology: "#7dcea0",
            evolution: "#58d68d",

            // History
            history: "#d35400",
            living_history: "#e67e22",
            military: "#922b21",
            war: "#641e16",
            archaeological: "#a04000",

            // Other
            open_air: "#8e44ad",
            local: "#9b59b6",
            children: "#f39c12",
            ethnography: "#af7ac5",
            person: "#c0392b",
            language: "#7f8c8d",
            health: "#48c9b0",

            // fallback
            other: "#555555"
        };

        // Overpass API query
        var query = `
        [out:json][timeout:25];
        area["name"="Nederland"]->.searchArea;
        (
          node["tourism"="museum"](area.searchArea);
          way["tourism"="museum"](area.searchArea);
          relation["tourism"="museum"](area.searchArea);
        );
        out center tags;
        `;

        // Data ophalen
        fetch("https://overpass-api.de/api/interpreter", {
            method: "POST",
            body: query
        })

        .then(res => res.json())

        .then(data => {

            data.elements.forEach(el => {

                var lat =
                    el.lat ||
                    (el.center && el.center.lat);

                var lon =
                    el.lon ||
                    (el.center && el.center.lon);

                // Skip zonder coordinaten
                if (!lat || !lon) return;

                var tags = el.tags || {};

                // Museumnaam
                var name =
                    tags.name || "Museum";

                // Museum types ophalen
                let museumTypes = [];

                // museum=* kan meerdere waarden bevatten
                if (tags.museum) {

                    museumTypes = tags.museum
                        .split(";")
                        .map(t => t.trim().toLowerCase());

                }

                // Alleen geldige keywords behouden
                museumTypes = museumTypes.filter(type =>
                    museumColors[type]
                );

                // Geen match = other
                if (museumTypes.length === 0) {
                    museumTypes = ["other"];
                }

                // Museum opslaan
                museums.push({
                    name: name,
                    lat: lat,
                    lon: lon,
                    types: museumTypes
                });

            });

            // Eerst alles tonen
            showMuseums();

            // Loading verbergen
            document.getElementById("loading").style.display = "none";
        })

        .catch(err => {
            console.error("Fout bij ophalen data:", err);

            document.getElementById("loading").innerText =
                "Fout bij laden van museums.";
        });

        // Museums tonen
        function showMuseums() {

            markersLayer.clearLayers();

            museums.forEach(museum => {

                var marker = L.marker([museum.lat, museum.lon])
                    .addTo(markersLayer);

                // Eerst loading tonen
                marker.bindPopup(`
                    Loading<span class="dots"></span>
                `);

                // Wanneer popup opent
                marker.on("click", function () {

                    // Tijdelijke loading popup
                    marker.setPopupContent(`
                        Loading<span class="dots"></span>
                    `);

                    // Simuleer trage data
                    setTimeout(() => {

                        // Kleuren verzamelen
                        let colors = museum.types.map(
                            type => museumColors[type]
                        );

                        // Gradient maken
                        let gradient = "";

                        if (colors.length === 1) {

                            gradient = colors[0];

                        } else {

                            const step = 100 / colors.length;

                            gradient = `linear-gradient(
                                90deg,
                                ${
                                    colors.map((color, index) => {

                                        const start =
                                            index * step;

                                        const end =
                                            (index + 1) * step;

                                        return `
                                            ${color}
                                            ${start}%
                                            ${end}%
                                        `;

                                    }).join(", ")
                                }
                            )`;
                        }

                        marker.setPopupContent(`

                            <div style="
                                background: ${gradient};
                                padding: 12px;
                                border-radius: 10px;
                                color: white;
                                min-width: 220px;
                            ">

                                <b>${museum.name}</b>

                                <br><br>

                                <b>Type:</b>
                                ${museum.types.join(", ")}

                                <br><br>

                                <a 
                                    href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(museum.name)}"
                                    target="_blank"
                                    style="
                                        color: white;
                                        font-weight: bold;
                                        text-decoration: underline;
                                    "
                                >
                                    Open in Google Maps
                                </a>

                            </div>
                        `);

                    }, 500);

                });

            });
        }

    </script>

</body>
</html>
