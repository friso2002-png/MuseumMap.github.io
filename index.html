<!DOCTYPE html>
<html lang="nl">
<header>
    <h1>MuseumMap Nederland</h1>
    <p>Ontdek musea door heel Nederland op de interactieve kaart.</p>
</header>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseumMap Nederland</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
    body {
        background-color: yellow;
        margin: 0;
        font-family: Arial, sans-serif;
    }

    header {
        text-align: center;
        padding: 20px;
    }

    header h1 {
        margin-bottom: 10px;
        font-size: 36px;
    }

    header p {
        font-size: 18px;
        color: #333;
    }

    #map {
        height: 500px;
        width: 800px;
        margin: 40px auto;
        border: 2px solid black;
        border-radius: 10px;
    }
</style>
</head>

<body>

    <!-- Kaart container -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
    // Kaart maken
    var map = L.map('map').setView([52.370216, 4.895168], 7);

    // Basiskaart
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Overpass API query
    var query = `
    [out:json][timeout:25];
    area["name"="Nederland"]->.searchArea;
    (
      node["tourism"="museum"](area.searchArea);
      way["tourism"="museum"](area.searchArea);
      relation["tourism"="museum"](area.searchArea);
    );
    out center;
    `;

    // Data ophalen
    fetch("https://overpass-api.de/api/interpreter", {
        method: "POST",
        body: query
    })
    .then(res => res.json())
    .then(data => {
        data.elements.forEach(el => {
            var lat = el.lat || (el.center && el.center.lat);
            var lon = el.lon || (el.center && el.center.lon);

            if (!lat || !lon) return;

            var name = el.tags && el.tags.name ? el.tags.name : "Museum";

            L.marker([lat, lon])
                .addTo(map)
                .bindPopup(name);
        });
    })
    .catch(err => console.error(err));
    </script>

</body>
</html>
