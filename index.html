<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MuseumMap Netherlands</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>

        body {
            background-color: yellow;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        header p {
            font-size: 18px;
            color: #333;
        }

        #map {
            height: 500px;
            width: 800px;
            margin: 40px auto;
            border: 2px solid black;
            border-radius: 10px;
        }

        /* Filter balk */
        #filterContainer {
            width: 800px;
            margin: 0 auto;
        }

        #filterToggle {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: 2px solid black;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
        }

        #filterPanel {
            display: none;
            background: white;
            border: 2px solid black;
            border-top: none;
            padding: 15px;
            border-radius: 0 0 10px 10px;
        }

        .filterItem {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .filterItem label {
            margin-left: 8px;
        }

        /* Kleurblokjes legenda */
        .keywordColor {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            margin-left: 8px;
            margin-right: 6px;
            border: 1px solid #000;
            vertical-align: middle;
        }

        /* Responsive voor mobiel */
        @media (max-width: 850px) {

            #map {
                width: 95%;
                height: 400px;
            }

            #filterContainer {
                width: 95%;
            }
        }

        /* Loading scherm */
        #loading {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            font-size: 18px;
            margin: 0 auto;
        }

        /* Animated dots */
        .dots::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {

            0% {
                content: "";
            }

            25% {
                content: ".";
            }

            50% {
                content: "..";
            }

            75% {
                content: "...";
            }

            100% {
                content: "";
            }
        }

    </style>
</head>

<body>

    <header>
        <h1>MuseumMap Netherlands</h1>
        <p>Discover the countless museums scattered across the Netherlands.</p>
    </header>

    <!-- Filter balk -->
    <div id="filterContainer">

        <button id="filterToggle">
            Museum types ▼
        </button>

        <div id="filterPanel">
            <!-- Checkboxes worden automatisch toegevoegd -->
        </div>

    </div>

    <!-- Loading -->
    <div id="loading">
        Loading museums & ratings<span class="dots"></span>
    </div>

    <!-- Kaart -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // Kaart initialiseren
        var map = L.map('map').setView([52.370216, 4.895168], 7);

        // OpenStreetMap tiles
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap contributors'
            }
        ).addTo(map);

        // LayerGroup voor markers
        var markersLayer = L.layerGroup().addTo(map);

        // Museums opslaan
        var museums = [];

        // Actieve filters
        let activeTypes = new Set();

        // Kleuren per museumtype
        const museumColors = {

            // Art
            art: "red",
            gallery: "darkred",

            // Transport
            transport: "blue",
            railway: "navy",
            aviation: "skyblue",
            aerospace: "deepskyblue",
            maritime: "teal",

            // Science
            science: "green",
            apis_mellifera: "goldenrod",
            nature: "darkgreen",
            technology: "limegreen",
            agriculture: "olive",
            palaeontology: "saddlebrown",
            evolution: "forestgreen",

            // History
            history: "brown",
            living_history: "peru",
            military: "darkslategray",
            war: "black",
            archaeological: "chocolate",

            // Other
            open_air: "orange",
            local: "gold",
            children: "hotpink",
            ethnography: "purple",
            person: "mediumvioletred",
            language: "indigo",
            health: "crimson",

            // Fallback
            other: "BlueViolet"
        };

        // Overpass query
        var query = `
        [out:json][timeout:25];
        area["name"="Nederland"]->.searchArea;

        (
          node["tourism"="museum"](area.searchArea);
          way["tourism"="museum"](area.searchArea);
          relation["tourism"="museum"](area.searchArea);
        );

        out center tags qt;
        `;

        // Museums laden
        async function loadMuseums() {

            try {

                // Loading tekst
                document.getElementById("loading").innerHTML =
                    `Loading museums & ratings<span class="dots"></span>`;

                // Overpass data ophalen
                const res = await fetch(
                    "https://overpass-api.de/api/interpreter",
                    {
                        method: "POST",
                        body: query
                    }
                );

                const data = await res.json();

                // Teller voor loading
                let loadedCount = 0;
                const totalMuseums = data.elements.length;

                // Alle museums verwerken
                const museumPromises = data.elements.map(async (el) => {

                    var lat =
                        el.lat ||
                        (el.center && el.center.lat);

                    var lon =
                        el.lon ||
                        (el.center && el.center.lon);

                    // Skip zonder coordinaten
                    if (!lat || !lon) return null;

                    var tags = el.tags || {};

                    // Museumnaam
                    var name =
                        tags.name || "Museum";

                    // Slimmere museumtype detectie
                    let museumType =
                        tags.museum ||
                        tags.subject ||
                        tags.theme ||
                        tags.collection ||
                        "other";

                    const text =
                        (
                            name + " " +
                            (tags.subject || "") + " " +
                            (tags.theme || "") + " " +
                            (tags.collection || "")
                        ).toLowerCase();

                    if (text.includes("art")) museumType = "art";
                    else if (text.includes("science")) museumType = "science";
                    else if (text.includes("war")) museumType = "war";
                    else if (text.includes("history")) museumType = "history";
                    else if (text.includes("rail")) museumType = "railway";
                    else if (text.includes("maritime")) museumType = "maritime";
                    else if (text.includes("military")) museumType = "military";
                    else if (text.includes("aviation")) museumType = "aviation";

                    // Fallback
                    if (!museumColors[museumType]) {
                        museumType = "other";
                    }

                    // Rating simulatie
                    // Hier kun je later echte API gebruiken
                    let rating = "Geen rating";

                    try {

                        // Simuleer langzame rating API
                        await new Promise(r =>
                            setTimeout(r, 50)
                        );

                        rating =
                            (
                                (Math.random() * 2) + 3
                            ).toFixed(1);

                    } catch (err) {

                        console.error(
                            "Fout bij rating ophalen:",
                            err
                        );
                    }

                    // Loading voortgang
                    loadedCount++;

                    document.getElementById("loading").innerHTML =
                        `Loading museums & ratings (${loadedCount}/${totalMuseums})<span class="dots"></span>`;

                    return {
                        name,
                        lat,
                        lon,
                        type: museumType,
                        color: museumColors[museumType],
                        rating
                    };
                });

                // Wachten tot alles geladen is
                museums =
                    (
                        await Promise.all(museumPromises)
                    ).filter(Boolean);

                // Filter panel bouwen
                createFilterPanel();

                // Museums tonen
                showMuseums();

                // Loading verbergen
                document.getElementById("loading").style.display =
                    "none";

            } catch (err) {

                console.error(
                    "Fout bij ophalen data:",
                    err
                );

                document.getElementById("loading").innerText =
                    "Fout bij laden van museums.";
            }
        }

        // Filter panel maken
        function createFilterPanel() {

            const filterPanel =
                document.getElementById("filterPanel");

            // Unieke museumtypes
            const museumTypes =
                [...new Set(museums.map(m => m.type))].sort();

            // Alles standaard aanvinken
            museumTypes.forEach(type =>
                activeTypes.add(type)
            );

            museumTypes.forEach(type => {

                const wrapper =
                    document.createElement("div");

                wrapper.className = "filterItem";

                const checkbox =
                    document.createElement("input");

                checkbox.type = "checkbox";
                checkbox.checked = true;
                checkbox.id = `filter-${type}`;

                checkbox.addEventListener("change", () => {

                    if (checkbox.checked) {
                        activeTypes.add(type);
                    } else {
                        activeTypes.delete(type);
                    }

                    showMuseums();
                });

                const colorBox =
                    document.createElement("span");

                colorBox.className = "keywordColor";
                colorBox.style.backgroundColor =
                    museumColors[type];

                const label =
                    document.createElement("label");

                label.htmlFor = checkbox.id;
                label.innerText =
                    type.replace(/_/g, " ");

                wrapper.appendChild(checkbox);
                wrapper.appendChild(colorBox);
                wrapper.appendChild(label);

                filterPanel.appendChild(wrapper);
            });
        }

        // Filter uitklappen
        const filterToggle =
            document.getElementById("filterToggle");

        const filterPanel =
            document.getElementById("filterPanel");

        filterToggle.addEventListener("click", () => {

            if (filterPanel.style.display === "block") {

                filterPanel.style.display = "none";

                filterToggle.innerHTML =
                    "Museum types ▼";

            } else {

                filterPanel.style.display = "block";

                filterToggle.innerHTML =
                    "Museum types ▲";
            }
        });

        // Museums tonen
        function showMuseums() {

            markersLayer.clearLayers();

            museums.forEach(museum => {

                // Alleen actieve filters
                if (!activeTypes.has(museum.type)) {
                    return;
                }

                var marker =
                    L.circleMarker(
                        [museum.lat, museum.lon],
                        {
                            radius: 8,
                            fillColor: museum.color,
                            color: "#000",
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.8
                        }
                    ).addTo(markersLayer);

                // Popup
                marker.bindPopup(`
                    <b>${museum.name}</b><br>
                    Type: ${museum.type.replace(/_/g, " ")}<br>
                    ⭐ Rating: ${museum.rating}<br><br>

                    <a 
                        href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(museum.name)}"
                        target="_blank"
                    >
                        Open in Google Maps
                    </a>
                `);
            });
        }

        // Start laden
        loadMuseums();

    </script>

</body>

</html>
