<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MuseumMap Netherlands</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body {
            background-color: yellow;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        header p {
            font-size: 18px;
            color: #333;
        }

        #map {
            height: 500px;
            width: 800px;
            margin: 40px auto;
            border: 2px solid black;
            border-radius: 10px;
        }

        /* Responsive voor mobiel */
        @media (max-width: 850px) {
            #map {
                width: 95%;
                height: 400px;
            }
        }

        #loading {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            font-size: 18px;
            margin: 0 auto;
        }

        /* Animated dots */
        .dots::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% {
                content: "";
            }

            25% {
                content: ".";
            }

            50% {
                content: "..";
            }

            75% {
                content: "...";
            }

            100% {
                content: "";
            }
        }

        /* Filterbalk */
        #filterContainer {
            width: 800px;
            margin: 20px auto 0 auto;
            text-align: left;
        }

        #toggleFilters {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid black;
            border-radius: 8px;
            background: white;
            cursor: pointer;
        }

        #filters {
            margin-top: 10px;
            background: white;
            border: 2px solid black;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        #filters.hidden {
            display: none;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 14px;
        }

        @media (max-width: 850px) {
            #filterContainer {
                width: 95%;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>MuseumMap Netherlands</h1>
        <p>Discover the countless museums scattered across the Netherlands.</p>
    </header>

    <!-- Loading -->
    <div id="loading">
        Loading museums<span class="dots"></span>
    </div>

    <!-- Filterbalk -->
    <div id="filterContainer">

        <button id="toggleFilters">
            Museum keywords ▼
        </button>

        <div id="filters" class="hidden"></div>

    </div>

    <!-- Kaart -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // Kaart initialiseren
        var map = L.map('map').setView([52.370216, 4.895168], 7);

        // OpenStreetMap tiles
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap contributors'
            }
        ).addTo(map);

        // LayerGroup voor markers
        var markersLayer = L.layerGroup().addTo(map);

        // Museums opslaan
        var museums = [];

        // Kleuren per museumtype
        const museumColors = {

            // Art
            art: "red",
            gallery: "darkred",

            // Transport
            transport: "blue",
            railway: "navy",
            aviation: "skyblue",
            aerospace: "deepskyblue",
            maritime: "teal",

            // Science
            science: "green",
            apis_mellifera: "goldenrod",
            nature: "darkgreen",
            technology: "limegreen",
            agriculture: "olive",
            palaeontology: "saddlebrown",
            evolution: "forestgreen",

            // History
            history: "brown",
            living_history: "peru",
            military: "darkslategray",
            war: "black",
            archaeological: "chocolate",

            // Other
            open_air: "orange",
            local: "gold",
            children: "hotpink",
            ethnography: "purple",
            person: "mediumvioletred",
            language: "indigo",
            health: "crimson",

            // Fallback
            other: "gray"
        };

        // Geselecteerde museumtypes
        let selectedTypes =
            new Set(Object.keys(museumColors));

        // Filters genereren
        function createFilters() {

            const filtersDiv =
                document.getElementById("filters");

            filtersDiv.innerHTML = "";

            Object.keys(museumColors).forEach(type => {

                const wrapper =
                    document.createElement("label");

                wrapper.className = "filter-item";

                const checkbox =
                    document.createElement("input");

                checkbox.type = "checkbox";
                checkbox.checked = true;
                checkbox.value = type;

                checkbox.addEventListener("change", () => {

                    if (checkbox.checked) {
                        selectedTypes.add(type);
                    } else {
                        selectedTypes.delete(type);
                    }

                    showMuseums();
                });

                const colorDot =
                    document.createElement("span");

                colorDot.style.width = "12px";
                colorDot.style.height = "12px";
                colorDot.style.borderRadius = "50%";
                colorDot.style.display = "inline-block";
                colorDot.style.background =
                    museumColors[type];

                wrapper.appendChild(checkbox);
                wrapper.appendChild(colorDot);
                wrapper.appendChild(
                    document.createTextNode(type)
                );

                filtersDiv.appendChild(wrapper);
            });
        }

        // Uitklappen filtermenu
        document
            .getElementById("toggleFilters")
            .addEventListener("click", () => {

                document
                    .getElementById("filters")
                    .classList.toggle("hidden");
            });

        // Overpass API query
        var query = `
        [out:json][timeout:25];
        area["name"="Nederland"]->.searchArea;
        (
          node["tourism"="museum"](area.searchArea);
          way["tourism"="museum"](area.searchArea);
          relation["tourism"="museum"](area.searchArea);
        );
        out center tags;
        `;

        // Data ophalen
        fetch("https://overpass-api.de/api/interpreter", {
            method: "POST",
            body: query
        })

        .then(res => res.json())

        .then(data => {

            data.elements.forEach(el => {

                var lat =
                    el.lat ||
                    (el.center && el.center.lat);

                var lon =
                    el.lon ||
                    (el.center && el.center.lon);

                // Skip zonder coordinaten
                if (!lat || !lon) return;

                var tags = el.tags || {};

                // Museumnaam
                var name =
                    tags.name || "Museum";

                // Museumtype bepalen
                let museumType =
                    tags.museum || "other";

                // Alleen bekende types toestaan
                if (!museumColors[museumType]) {
                    museumType = "other";
                }

                // Museum opslaan
                museums.push({
                    name: name,
                    lat: lat,
                    lon: lon,
                    type: museumType,
                    color: museumColors[museumType]
                });
            });

            // Filters maken
            createFilters();

            // Museums tonen
            showMuseums();

            // Loading verbergen
            document.getElementById("loading").style.display = "none";
        })

        .catch(err => {

            console.error(
                "Fout bij ophalen data:",
                err
            );

            document.getElementById("loading").innerText =
                "Fout bij laden van museums.";
        });

        // Museums tonen
        function showMuseums() {

            markersLayer.clearLayers();

            museums.forEach(museum => {

                // Skip uitgeschakelde museumtypes
                if (!selectedTypes.has(museum.type)) {
                    return;
                }

                var marker = L.circleMarker(
                    [museum.lat, museum.lon],
                    {
                        radius: 8,
                        fillColor: museum.color,
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }
                ).addTo(markersLayer);

                // Eerst loading tonen
                marker.bindPopup(`
                    Loading<span class="dots"></span>
                `);

                // Wanneer popup opent
                marker.on("click", function () {

                    // Tijdelijke loading popup
                    marker.setPopupContent(`
                        Loading<span class="dots"></span>
                    `);

                    // Simuleer trage data
                    setTimeout(() => {

                        marker.setPopupContent(`
                            <b>${museum.name}</b><br>
                            Type: ${museum.type}<br><br>

                            <a 
                                href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(museum.name)}"
                                target="_blank"
                            >
                                Open in Google Maps
                            </a>
                        `);

                    }, 500);

                });

            });
        }

    </script>

</body>
</html>
