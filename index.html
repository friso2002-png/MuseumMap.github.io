<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MuseumMap Netherlands</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>

        body {
            background-color: yellow;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        header p {
            font-size: 18px;
            color: #333;
        }

        #map {
            height: 500px;
            width: 800px;
            margin: 40px auto;
            border: 2px solid black;
            border-radius: 10px;
        }

        /* Responsive mobiel */
        @media (max-width: 850px) {

            #map {
                width: 95%;
                height: 400px;
            }
        }

        #loading {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            font-size: 18px;
        }

        /* Animated dots */
        .dots::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {

            0% {
                content: "";
            }

            25% {
                content: ".";
            }

            50% {
                content: "..";
            }

            75% {
                content: "...";
            }

            100% {
                content: "";
            }
        }

    </style>
</head>

<body>

    <header>
        <h1>MuseumMap Netherlands</h1>
        <p>Discover the countless museums scattered across the Netherlands.</p>
    </header>

    <!-- Loading -->
    <div id="loading">
        Loading museums<span class="dots"></span>
    </div>

    <!-- Kaart -->
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // =========================
        // Kaart initialiseren
        // =========================

        var map = L.map('map').setView([52.370216, 4.895168], 7);

        // OpenStreetMap tiles
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap contributors'
            }
        ).addTo(map);

        // LayerGroup voor markers
        var markersLayer = L.layerGroup().addTo(map);

        // Museums opslaan
        var museums = [];

        // =========================
        // Kleuren per museumtype
        // =========================

        const museumColors = {

            // Art
            art: "#e74c3c",
            gallery: "#ff6b6b",

            // Transport
            transport: "#3498db",
            railway: "#2980b9",
            aviation: "#5dade2",
            aerospace: "#85c1e9",
            maritime: "#1f618d",

            // Science
            science: "#2ecc71",
            apis_mellifera: "#f4d03f",
            nature: "#27ae60",
            technology: "#16a085",
            agriculture: "#7dcea0",
            palaeontology: "#52be80",
            evolution: "#58d68d",

            // History
            history: "#a569bd",
            living_history: "#8e44ad",
            military: "#c0392b",
            war: "#922b21",
            archaeological: "#af7ac5",

            // Other
            open_air: "#f39c12",
            local: "#d35400",
            children: "#f5b041",
            ethnography: "#7f8c8d",
            person: "#566573",
            language: "#48c9b0",
            health: "#ec7063",

            // fallback
            other: "#444444"
        };

        // =========================
        // Museumtypes uitlezen
        // =========================

        function getMuseumTypes(tags) {

            let types = [];

            if (tags.museum) {

                let values = tags.museum
                    .split(";")
                    .map(v => v.trim());

                values.forEach(v => {

                    if (museumColors[v]) {
                        types.push(v);
                    }
                });
            }

            // Geen bekend type
            if (types.length === 0) {
                types.push("other");
            }

            return types;
        }

        // =========================
        // Gradient maken
        // =========================

        function createGradient(types) {

            // Eén type
            if (types.length === 1) {
                return museumColors[types[0]];
            }

            // Meerdere types
            const step = 100 / types.length;

            let parts = [];

            types.forEach((type, index) => {

                const start = index * step;
                const end = (index + 1) * step;

                parts.push(
                    `${museumColors[type]} ${start}% ${end}%`
                );
            });

            return `linear-gradient(90deg, ${parts.join(", ")})`;
        }

        // =========================
        // Overpass API query
        // =========================

        var query = `
        [out:json][timeout:25];

        area["name"="Nederland"]->.searchArea;

        (
          node["tourism"="museum"](area.searchArea);
          way["tourism"="museum"](area.searchArea);
          relation["tourism"="museum"](area.searchArea);
        );

        out center tags;
        `;

        // =========================
        // Data ophalen
        // =========================

        fetch("https://overpass-api.de/api/interpreter", {
            method: "POST",
            body: query
        })

        .then(res => res.json())

        .then(data => {

            data.elements.forEach(el => {

                var lat =
                    el.lat ||
                    (el.center && el.center.lat);

                var lon =
                    el.lon ||
                    (el.center && el.center.lon);

                // Skip zonder coordinaten
                if (!lat || !lon) return;

                var tags = el.tags || {};

                // Museumnaam
                var name =
                    tags.name || "Museum";

                // Museumtypes bepalen
                var types =
                    getMuseumTypes(tags);

                // Museum opslaan
                museums.push({
                    name: name,
                    lat: lat,
                    lon: lon,
                    tags: tags,
                    types: types
                });
            });

            // Museums tonen
            showMuseums();

            // Loading verbergen
            document.getElementById("loading").style.display = "none";
        })

        .catch(err => {

            console.error(
                "Fout bij ophalen data:",
                err
            );

            document.getElementById("loading").innerText =
                "Fout bij laden van museums.";
        });

        // =========================
        // Museums tonen
        // =========================

        function showMuseums() {

            markersLayer.clearLayers();

            museums.forEach(museum => {

                var marker =
                    L.marker([museum.lat, museum.lon])
                    .addTo(markersLayer);

                // Loading popup
                marker.bindPopup(`
                    Loading<span class="dots"></span>
                `);

                // Popup openen
                marker.on("click", function () {

                    // Tijdelijke loading
                    marker.setPopupContent(`
                        Loading<span class="dots"></span>
                    `);

                    // Simuleer trage data
                    setTimeout(() => {

                        // Gradient maken
                        const gradient =
                            createGradient(museum.types);

                        // Popup inhoud
                        marker.setPopupContent(`

                            <div style="
                                background: ${gradient};
                                padding: 14px;
                                border-radius: 10px;
                                color: white;
                                min-width: 240px;
                            ">

                                <b style="
                                    font-size: 18px;
                                ">
                                    ${museum.name}
                                </b>

                                <br><br>

                                <b>Type:</b>
                                ${museum.types.join(", ")}

                                <br><br>

                                <a
                                    href="
                                    https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(museum.name)}
                                    "
                                    target="_blank"
                                    style="
                                        color: white;
                                        text-decoration: underline;
                                    "
                                >
                                    Open in Google Maps
                                </a>

                            </div>

                        `);

                    }, 500);

                });

            });
        }

    </script>

</body>
</html>
