<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MuseumMap Netherlands</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

    <style>
        body {
            background-color: yellow;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        header {
            text-align: center;
            padding: 20px;
        }

        header h1 {
            margin-bottom: 10px;
            font-size: 36px;
        }

        header p {
            font-size: 18px;
            color: #333;
        }

        #map {
            height: 500px;
            width: 800px;
            margin: 40px auto;
            border: 2px solid black;
            border-radius: 10px;
        }

        #filterContainer {
            width: 800px;
            margin: 0 auto;
        }

        #filterToggle {
            width: 100%;
            padding: 14px;
            font-size: 18px;
            border: 2px solid black;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            text-align: left;
        }

        #filterPanel {
            display: none;
            background: white;
            border: 2px solid black;
            border-top: none;
            padding: 15px;
            border-radius: 0 0 10px 10px;
        }

        .filterItem {
            margin-bottom: 10px;
            font-size: 16px;
        }

        .filterItem label {
            margin-left: 8px;
        }

        .keywordColor {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 3px;
            margin-left: 8px;
            margin-right: 6px;
            border: 1px solid #000;
            vertical-align: middle;
        }

        @media (max-width: 850px) {

            #map,
            #filterContainer {
                width: 95%;
            }

            #map {
                height: 400px;
            }
        }

        #loading {
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 9999;
            font-size: 18px;
        }

        .dots::after {
            content: "";
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0% {
                content: "";
            }

            25% {
                content: ".";
            }

            50% {
                content: "..";
            }

            75% {
                content: "...";
            }

            100% {
                content: "";
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>MuseumMap Netherlands</h1>
        <p>Discover museums across the Netherlands.</p>
    </header>

    <!-- Filter -->
    <div id="filterContainer">

        <button id="filterToggle">
            Museum types ▼
        </button>

        <div id="filterPanel">
            <!-- Dynamisch gevuld -->
        </div>

    </div>

    <!-- Loading -->
    <div id="loading">
        Loading museums<span class="dots"></span>
    </div>

    <!-- Map -->
    <div id="map"></div>

    <!-- Leaflet -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>

        // =========================
        // MAP INITIALISEREN
        // =========================

        const map = L.map('map').setView([52.1326, 5.2913], 7);

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
            {
                attribution: '© OpenStreetMap contributors'
            }
        ).addTo(map);

        // =========================
        // DATA STRUCTUREN
        // =========================

        const markersLayer = L.layerGroup().addTo(map);

        const museums = [];

        const activeTypes = new Set();

        // =========================
        // KLEUREN
        // =========================

        const museumColors = {

            art: "red",
            gallery: "darkred",

            transport: "blue",
            railway: "navy",
            aviation: "skyblue",
            maritime: "teal",

            science: "green",
            technology: "limegreen",
            nature: "darkgreen",

            history: "brown",
            military: "black",

            children: "hotpink",

            open_air: "orange",

            other: "BlueViolet"
        };

        // =========================
        // TYPES NORMALISEREN
        // =========================

        function normalizeType(type) {

            if (!type) return "other";

            type = type.toLowerCase();

            if (
                type.includes("kunst") ||
                type.includes("art")
            ) {
                return "art";
            }

            if (
                type.includes("spoor") ||
                type.includes("rail")
            ) {
                return "railway";
            }

            if (
                type.includes("maritiem") ||
                type.includes("maritime")
            ) {
                return "maritime";
            }

            if (
                type.includes("science") ||
                type.includes("wetenschap")
            ) {
                return "science";
            }

            if (
                type.includes("geschiedenis") ||
                type.includes("history")
            ) {
                return "history";
            }

            if (
                type.includes("oorlog") ||
                type.includes("military")
            ) {
                return "military";
            }

            if (
                type.includes("kind")
            ) {
                return "children";
            }

            if (
                type.includes("openlucht")
            ) {
                return "open_air";
            }

            return "other";
        }

        // =========================
        // DATA LADEN
        // =========================

        fetch("./data/museums.json")

            .then(response => {

                if (!response.ok) {
                    throw new Error("JSON bestand niet gevonden");
                }

                return response.json();
            })

            .then(data => {

                console.log("JSON geladen:", data);

                data.forEach(museum => {

                    // =========================
                    // PAS DIT AAN OP JOUW JSON
                    // =========================

                    const name =
                        museum.name ||
                        museum.title ||
                        "Museum";

                    const lat =
                        parseFloat(
                            museum.lat ||
                            museum.latitude
                        );

                    const lon =
                        parseFloat(
                            museum.lon ||
                            museum.longitude
                        );

                    const rawType =
                        museum.type ||
                        museum.category ||
                        "other";

                    // Skip zonder coordinaten
                    if (
                        isNaN(lat) ||
                        isNaN(lon)
                    ) {
                        return;
                    }

                    // Type normaliseren
                    let museumType =
                        normalizeType(rawType);

                    museums.push({

                        name: name,

                        lat: lat,

                        lon: lon,

                        type: museumType,

                        color: museumColors[museumType]
                    });
                });

                console.log(
                    "Aantal museums:",
                    museums.length
                );

                createFilterPanel();

                showMuseums();

                document.getElementById("loading").style.display =
                    "none";
            })

            .catch(err => {

                console.error(err);

                document.getElementById("loading").innerHTML =
                    `
                    Error loading museums.<br><br>
                    Controleer:
                    <br>
                    - draait via Live Server
                    <br>
                    - data/museums.json bestaat
                    <br>
                    - JSON is geldig
                    `;
            });

        // =========================
        // FILTER PANEL
        // =========================

        function createFilterPanel() {

            const filterPanel =
                document.getElementById("filterPanel");

            const museumTypes =
                [...new Set(
                    museums.map(m => m.type)
                )].sort();

            museumTypes.forEach(type => {

                activeTypes.add(type);

                const wrapper =
                    document.createElement("div");

                wrapper.className = "filterItem";

                const checkbox =
                    document.createElement("input");

                checkbox.type = "checkbox";

                checkbox.checked = true;

                checkbox.id = `filter-${type}`;

                checkbox.addEventListener("change", () => {

                    if (checkbox.checked) {
                        activeTypes.add(type);
                    } else {
                        activeTypes.delete(type);
                    }

                    showMuseums();
                });

                const colorBox =
                    document.createElement("span");

                colorBox.className = "keywordColor";

                colorBox.style.backgroundColor =
                    museumColors[type];

                const label =
                    document.createElement("label");

                label.htmlFor = checkbox.id;

                label.innerText =
                    type.replace(/_/g, " ");

                wrapper.appendChild(checkbox);

                wrapper.appendChild(colorBox);

                wrapper.appendChild(label);

                filterPanel.appendChild(wrapper);
            });
        }

        // =========================
        // FILTER TOGGLE
        // =========================

        const filterToggle =
            document.getElementById("filterToggle");

        const filterPanel =
            document.getElementById("filterPanel");

        filterToggle.addEventListener("click", () => {

            if (filterPanel.style.display === "block") {

                filterPanel.style.display = "none";

                filterToggle.innerHTML =
                    "Museum types ▼";

            } else {

                filterPanel.style.display = "block";

                filterToggle.innerHTML =
                    "Museum types ▲";
            }
        });

        // =========================
        // MUSEUMS TONEN
        // =========================

        function showMuseums() {

            markersLayer.clearLayers();

            museums.forEach(museum => {

                if (!activeTypes.has(museum.type)) {
                    return;
                }

                const marker = L.circleMarker(
                    [museum.lat, museum.lon],
                    {
                        radius: 8,
                        fillColor: museum.color,
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }
                ).addTo(markersLayer);

                marker.bindPopup(`
                    Loading<span class="dots"></span>
                `);

                marker.on("click", function () {

                    marker.setPopupContent(`
                        Loading<span class="dots"></span>
                    `);

                    setTimeout(() => {

                        marker.setPopupContent(`
                            <b>${museum.name}</b><br>

                            Type:
                            ${museum.type.replace(/_/g, " ")}

                            <br><br>

                            <a
                                href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(museum.name)}"
                                target="_blank"
                            >
                                Open in Google Maps
                            </a>
                        `);

                    }, 300);
                });
            });
        }

    </script>

</body>

</html>
