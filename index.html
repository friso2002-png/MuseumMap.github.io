<!DOCTYPE html>
<html lang="nl">
<div id="map"></div>
<head>
  <meta charset="UTF-8">
  <title>Museummap</title>
  <!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
  <link rel="stylesheet" href="style.css">
<body>
  <h1>Welcome to MuseumMap</h1>
  <p>Here you find every museum in the netherlands.</p>
  <div id="map" style="height: 500px;"></div>
  <script>
<script>
// Kaart maken
var map = L.map('map').setView([52.370216, 4.895168], 7);

// Basiskaart
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors'
}).addTo(map);

// Overpass API query
var query = `
[out:json][timeout:25];
area["name"="Nederland"]->.searchArea;
(
  node["tourism"="museum"](area.searchArea);
  way["tourism"="museum"](area.searchArea);
  relation["tourism"="museum"](area.searchArea);
);
out center;
`;

// Musea ophalen
fetch("https://overpass-api.de/api/interpreter", {
    method: "POST",
    body: query
})
.then(res => res.json())
.then(data => {
    data.elements.forEach(el => {

        var lat = el.lat || el.center.lat;
        var lon = el.lon || el.center.lon;

        var name = el.tags && el.tags.name
            ? el.tags.name
            : "Museum";

        L.marker([lat, lon])
            .addTo(map)
            .bindPopup(name);
    });
})
.catch(err => console.error(err));

</script>

</script>
</body>
</html>
