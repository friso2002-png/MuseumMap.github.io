<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuseumMap Nederland</title>

    <!-- Eigen CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>

<body>

    <h1>Welcome to MuseumMap</h1>
    <p>Hier vind je musea in Nederland.</p>

    <div id="map" style="height: 600px; width: 50%; margin-left: 200px;"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <script>
        // Kaart maken
        var map = L.map('map').setView([52.1326, 5.2913], 7);

        // OpenStreetMap achtergrond
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Musea
        const museums = [
            {
                name: "Rijksmuseum",
                coords: [52.359998, 4.885219]
            },
            {
                name: "Van Gogh Museum",
                coords: [52.358416, 4.881076]
            },
            {
                name: "Mauritshuis",
                coords: [52.080985, 4.314691]
            },
            {
                name: "NEMO Science Museum",
                coords: [52.374153, 4.912426]
            },
            {
                name: "Boijmans Van Beuningen",
                coords: [51.914268, 4.471114]
            },
            {
                name: "Openluchtmuseum",
                coords: [52.005278, 5.899722]
            },
            {
                name: "Fries Museum",
                coords: [53.201233, 5.799913]
            }
        ];

        // Markers toevoegen
        museums.forEach(museum => {
            L.marker(museum.coords)
                .addTo(map)
                .bindPopup(`<b>${museum.name}</b>`);
        });

    </script>

</body>
</html>
